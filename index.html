<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPlayer Playlist Online</title>
<style>
    * { box-sizing: border-box; }
    body {
        background-color: #000;
        color: #fff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 20px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
    }
    .header-box {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        position: sticky;
        top: 20px;
        z-index: 10;
    }
    input[type="url"] {
        flex: 1;
        padding: 12px 15px;
        background-color: #222;
        border: 1px solid #444;
        border-radius: 8px;
        color: #fff;
        font-size: 16px;
        outline: none;
        transition: border-color 0.3s;
    }
    input[type="url"]:focus {
        border-color: #007bff;
    }
    button.kirim {
        padding: 12px 25px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.3s;
    }
    button.kirim:hover {
        background-color: #0056b3;
    }
    ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    li {
        background-color: #151515;
        margin-bottom: 10px;
        padding: 15px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: grab;
        border: 1px solid #333;
        transition: transform 0.2s, background-color 0.2s;
    }
    li:active {
        cursor: grabbing;
    }
    li.playing {
        border-color: #0f0;
        background-color: #1a251a;
    }
    li.dragging {
        opacity: 0.4;
        background-color: #333;
    }
    .link-text {
        flex: 1;
        margin-right: 15px;
        font-size: 14px;
        word-break: break-all;
        pointer-events: none;
    }
    .icon {
        font-size: 18px;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .check {
        color: #0f0;
        cursor: default;
    }
    .cross {
        color: #ff4d4d;
        cursor: pointer;
        padding: 5px;
        transition: transform 0.2s;
    }
    .cross:hover {
        transform: scale(1.3);
    }
    #alertBox {
        display: none;
        background-color: #ff9800;
        color: #fff;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        text-align: center;
        cursor: pointer;
        font-weight: bold;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="header-box">
    <input type="url" id="linkInput" placeholder="Tempel link audio .mp3 di sini..." autocomplete="off">
    <button class="kirim" onclick="addLink()">Kirim</button>
</div>

<div id="alertBox" onclick="resumeAudio()">
    ⚠️ Browser memblokir Auto-play awal. Klik di sini untuk memutar audio!
</div>

<ul id="playlistContainer"></ul>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDrEQ7GcPPo8CbqF0_dRwDlXSXbz1FsmPs",
        authDomain: "hahahihi-5084e.firebaseapp.com",
        databaseURL: "https://hahahihi-5084e-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "hahahihi-5084e",
        storageBucket: "hahahihi-5084e.firebasestorage.app",
        messagingSenderId: "691544964510",
        appId: "1:691544964510:web:561a1aed05c8a8f5ff6a8f"
    };

    // Inisialisasi Firebase & Database
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'playerState'); // Folder database yang kita gunakan

    let playlist = [];
    let currentIndex = 0;
    let isInitialized = false; // Mencegah pemutaran berulang saat sinkronisasi awal
    
    const audio = new Audio();
    const container = document.getElementById('playlistContainer');
    const alertBox = document.getElementById('alertBox');

    // Autoplay antrean selanjutnya & Looping
    audio.addEventListener('ended', () => {
        currentIndex++;
        if (currentIndex >= playlist.length) {
            currentIndex = 0;
        }
        saveData(); // Simpan ke database, onValue akan otomatis men-trigger pemutaran
    });

    // Sinkronisasi Real-Time dengan Firebase
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        const prevPlayingId = playlist[currentIndex]?.id;

        if (data) {
            playlist = data.playlist || [];
            currentIndex = data.currentIndex || 0;
        } else {
            playlist = [];
            currentIndex = 0;
        }

        renderList();

        const newPlayingId = playlist[currentIndex]?.id;

        // Cek apakah ada lagu dan apakah harus mulai memutar
        if (playlist.length > 0) {
            if (prevPlayingId !== newPlayingId || !isInitialized) {
                playCurrent();
            }
        } else {
            audio.pause();
        }
        isInitialized = true;
    });

    // Fungsi menyimpan ke Firebase Database
    function saveData() {
        set(dbRef, {
            playlist: playlist,
            currentIndex: currentIndex
        });
    }

    // Karena memakai type="module", kita daftarkan fungsi ke 'window' agar bisa dipanggil dari elemen HTML
    window.addLink = function() {
        const input = document.getElementById('linkInput');
        const url = input.value.trim();
        if (!url) return;

        playlist.push({ url: url, id: Date.now() });
        
        // Jika list sebelumnya kosong, jadikan index lagu ini yang utama
        if (playlist.length === 1) {
            currentIndex = 0;
        }
        
        saveData(); // Sinkronisasi ke Firebase
        input.value = '';
    };

    window.deleteLink = function(id) {
        const index = playlist.findIndex(p => p.id === id);
        if (index === -1) return;

        playlist.splice(index, 1);
        
        if (index < currentIndex) {
            currentIndex--; 
        }
        
        saveData();
    };

    window.resumeAudio = function() {
        audio.play().then(() => {
            alertBox.style.display = 'none';
            renderList();
        });
    };

    // Fungsi Putar Audio
    function playCurrent() {
        if (playlist.length === 0) {
            audio.pause();
            return;
        }
        
        if (currentIndex >= playlist.length) currentIndex = 0;

        const targetUrl = playlist[currentIndex].url;

        // Mencegah audio mengulang dari detik 0 apabila yang disinkronisasi adalah lagu yang sama
        if (audio.src === targetUrl && !audio.paused) {
            return; 
        }

        audio.src = targetUrl;
        const playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.then(() => {
                alertBox.style.display = 'none';
                renderList();
            }).catch(error => {
                console.warn("Autoplay terblokir browser:", error);
                alertBox.style.display = 'block';
                renderList();
            });
        }
    }

    // Menampilkan Antrean ke Layar
    function renderList() {
        container.innerHTML = '';
        const currentId = playlist[currentIndex]?.id;

        playlist.forEach((item, index) => {
            const li = document.createElement('li');
            li.draggable = true; 
            li.dataset.id = item.id;

            const isPlaying = (item.id === currentId);
            
            if (isPlaying) {
                li.classList.add('playing');
            }

            li.innerHTML = `
                <div class="link-text">${item.url}</div>
                <div class="icon">
                    ${isPlaying 
                        ? '<span class="check" title="Now Playing">✅</span>' 
                        : \`<span class="cross" onclick="deleteLink(\${item.id})" title="Hapus Permanen">❌</span>\`}
                </div>
            `;

            // Event Listener Drag and Drop
            li.addEventListener('dragstart', handleDragStart);
            li.addEventListener('dragover', handleDragOver);
            li.addEventListener('drop', handleDrop);
            li.addEventListener('dragend', handleDragEnd);

            container.appendChild(li);
        });
    }

    // Fitur Setting Urutan Tampil (Drag & Drop)
    let dragEl = null;

    function handleDragStart(e) {
        if (e.target.classList.contains('cross')) return; 
        dragEl = this;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/html', this.innerHTML);
        setTimeout(() => this.classList.add('dragging'), 0);
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (dragEl && dragEl !== this) {
            const bounding = this.getBoundingClientRect();
            const offset = e.clientY - bounding.top;
            if (offset > bounding.height / 2) {
                this.after(dragEl); 
            } else {
                this.before(dragEl); 
            }
        }
        return false;
    }

    function handleDrop(e) {
        e.stopPropagation();
        updateArrayFromDOM();
        return false;
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
    }

    function updateArrayFromDOM() {
        const items = [...container.querySelectorAll('li')];
        let newPlaylist = [];
        let newCurrentIndex = currentIndex;
        const playingId = playlist[currentIndex]?.id;

        items.forEach((item, i) => {
            const id = parseInt(item.dataset.id);
            const track = playlist.find(p => p.id === id);
            if (track) newPlaylist.push(track);
            
            // Perbarui currentIndex jika posisi lagu yang diputar bergeser
            if (track && track.id === playingId) {
                newCurrentIndex = i;
            }
        });

        playlist = newPlaylist;
        currentIndex = newCurrentIndex; 
        saveData(); // Sebar urutan baru ke seluruh perangkat via Firebase
    }
</script>
</body>
</html>
