<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .station {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .station:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }

        .station.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
        }

        .station-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .station-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .station-genre {
            color: #888;
            font-size: 0.85rem;
        }

        .play-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Player Bar */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 26, 0.98);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: none;
            align-items: center;
            gap: 1rem;
        }

        .player-bar.active { display: flex; }

        .player-info { flex: 1; }
        
        .player-title { font-weight: 600; }
        .player-status { font-size: 0.8rem; color: #888; }

        .player-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .volume-slider {
            width: 80px;
            accent-color: #667eea;
        }

        /* Loading indicator */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #888;
        }

        .loader {
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 Radio Stream</h1>
        <div id="stations"></div>
    </div>

    <!-- Player Bar -->
    <div class="player-bar" id="playerBar">
        <div class="player-info">
            <div class="player-title" id="nowTitle">-</div>
            <div class="player-status" id="nowStatus">Stopped</div>
        </div>
        <button class="player-btn" id="playBtn">▶</button>
        <input type="range" class="volume-slider" id="volume" min="0" max="100" value="70">
    </div>

    <script>
        // Pre-configured radio stations
        const stations = [
            {
                name: "I-Radio",
                genre: "Indonesian Hits",
                url: "https://air.morat.com:9006/stream"
            },
            {
                name: "Hardrock FM",
                genre: "Rock & Metal",
                url: "https://stream.hardrockfm.id/live"
            },
            {
                name: "M Radio",
                genre: "Pop & Chart",
                url: "https://n038.solocpm.com/stream/7001"
            },
            {
                name: "Gen FM Jakarta",
                genre: "Pop Indonesia",
                url: "https://air.solocpm.com/genfm.mp3"
            },
            {
                name: "Prambors FM",
                genre: "Youth & Pop",
                url: "https://air.pramborsfm.com/live"
            }
        ];

        let audio = new Audio();
        let currentStation = null;
        let isPlaying = false;

        const stationsEl = document.getElementById('stations');
        const playerBar = document.getElementById('playerBar');
        const nowTitle = document.getElementById('nowTitle');
        const nowStatus = document.getElementById('nowStatus');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volume');

        // Render stations
        stations.forEach((station, index) => {
            const el = document.createElement('div');
            el.className = 'station';
            el.innerHTML = `
                <div class="station-header">
                    <div>
                        <div class="station-name">${station.name}</div>
                        <div class="station-genre">${station.genre}</div>
                    </div>
                    <div class="play-icon">▶</div>
                </div>
            `;
            el.onclick = () => playStation(index);
            stationsEl.appendChild(el);
        });

        function playStation(index) {
            const station = stations[index];
            
            if (currentStation === index && isPlaying) {
                // Pause
                audio.pause();
                isPlaying = false;
                updateUI();
                return;
            }

            // Play new station
            audio.src = station.url;
            audio.volume = volumeSlider.value / 100;
            
            playerBar.classList.add('active');
            currentStation = index;
            isPlaying = true;

            audio.play().then(() => {
                updateUI();
            }).catch(err => {
                nowStatus.textContent = 'Stream tidak tersedia';
                console.error(err);
            });

            updateUI();
        }

        function updateUI() {
            const els = document.querySelectorAll('.station');
            
            els.forEach((el, i) => {
                el.classList.toggle('active', i === currentStation && isPlaying);
                el.querySelector('.play-icon').textContent = 
                    (i === currentStation && isPlaying) ? '⏸' : '▶';
            });

            if (currentStation !== null) {
                nowTitle.textContent = stations[currentStation].name;
                nowStatus.textContent = isPlaying ? 'Playing...' : 'Paused';
                playBtn.textContent = isPlaying ? '⏸' : '▶';
            }
        }

        // Play/Pause button
        playBtn.onclick = () => {
            if (currentStation !== null) {
                if (isPlaying) {
                    audio.pause();
                } else {
                    audio.play();
                }
                isPlaying = !isPlaying;
                updateUI();
            }
        };

        // Volume control
        volumeSlider.oninput = () => {
            audio.volume = volumeSlider.value / 100;
        };

        // Audio events
        audio.onplay = () => { isPlaying = true; updateUI(); };
        audio.onpause = () => { isPlaying = false; updateUI(); };
        audio.onerror = () => { 
            nowStatus.textContent = 'Stream error - coba station lain';
            isPlaying = false;
            updateUI();
        };
    </script>
</body>
</html>
